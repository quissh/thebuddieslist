<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level details - Buddies Extreme Demons List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="top-bar">
        <div style="display:flex; align-items:center; gap:16px;">
          <a class="nav-button secondary" href="index.html">← Back to list</a>
          <h1 id="detailTitle">Level details</h1>
        </div>
        <div class="button-row">
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
      </div>
    </header>

    <main class="detail-layout">
      <section class="detail-video-panel">
        <div class="detail-video-title">Video preview</div>
        <div class="detail-video-frame" id="videoFrame"></div>
      </section>

      <aside class="detail-info-panel">
        <div class="info-block">
          <h2>Level info</h2>
          <p><strong>Level:</strong> <span id="detailLevel"></span></p>
          <p><strong>ID:</strong> <span id="detailId"></span></p>
          <p><strong>B-verified by:</strong> <span id="detailVerifier"></span></p>
          <p><strong>B-records:</strong> <span id="detailRecords"></span></p>
        </div>
        <div class="info-block">
          <h2>B-record holders</h2>
          <div class="record-holders" id="recordHolders">No B-record details available.</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="detail.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
      themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
